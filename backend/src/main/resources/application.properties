# SQL Server connection for SmartCampusDB
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SmartCampusDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=${DB_USERNAME:springbootuser}
spring.datasource.password=${DB_PASSWORD:12345678}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Database tables are managed by migration SQL (runs classpath db/migration on startup)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validateOnMigrate=false
spring.flyway.cleanDisabled=false
# Auto-create database if it doesn't exist
spring.flyway.schemas=SmartCampusDB
spring.flyway.createSchemas=true
# Existing DBs created before Flyway was enabled: create history table and skip re-applying <= baseline
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.show-sql=true
jwt.secret=${JWT_SECRET:SmartCampus2026JwtSecretKeyMustBe256BitsLongForHS256Algorithm!}
jwt.expiration-ms=86400000

