spring.application.name=smart-campus-backend

# ==================== MySQL Database ====================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME}?sslMode=${DB_SSL_MODE:REQUIRED}&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Server
server.port=8080

# ==================== JWT ====================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS}

# ==================== Google OAuth2 ====================
google.client-id=${GOOGLE_CLIENT_ID}

# ==================== CORS ====================
app.cors.allowed-origin=http://localhost:5173

# ==================== Invites ====================
app.invites.base-url=http://localhost:5173
app.invites.expiration-hours=72
