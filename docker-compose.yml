version: "3.8"

services:
  # ---- SQL Server Database ----
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: smartcampus-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "SmartCampus@2026"
      MSSQL_PID: "Developer"
    ports:
      - "1434:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "SmartCampus@2026" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---- Create Database (runs once) ----
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: smartcampus-db-init
    depends_on:
      sqlserver:
        condition: service_healthy
    entrypoint: /bin/bash
    command: >
      -c "/opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P 'SmartCampus@2026' -C -Q \"IF DB_ID('SmartCampusDB') IS NULL CREATE DATABASE SmartCampusDB\" && echo 'Database ready!'"
    restart: "no"

  # ---- Spring Boot Backend ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartcampus-backend
    environment:
      SPRING_DATASOURCE_URL: "jdbc:sqlserver://sqlserver:1433;databaseName=SmartCampusDB;encrypt=true;trustServerCertificate=true"
      DB_USERNAME: "sa"
      DB_PASSWORD: "SmartCampus@2026"
    ports:
      - "8080:8080"
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: on-failure

  # ---- React Frontend (Nginx) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartcampus-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: on-failure

volumes:
  sqlserver-data:
